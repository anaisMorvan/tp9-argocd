apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petclinic
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/anaisMorvan/tp8-helm-kubernetes.git
    targetRevision: HEAD
    path: 'petclinic/'
    helm:
      parameters:
      - name: "app.contextPath"
        value: "/tp9"
  destination:
    server: https://kubernetes.default.svc
    namespace: tp9-argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true